<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Warm paper tile with the brick-red deck mark (keep in sync with components/BrandMark.tsx) -->
  <rect width="32" height="32" rx="7" fill="#faf8f4" />

  <!-- The deck: a sheet stacked behind, peeking top-right -->
  <rect x="11" y="3" width="17" height="21" rx="3.5" fill="#a03b2e" opacity="0.28" />

  <!-- The paper: front sheet -->
  <rect x="4" y="8" width="17" height="21" rx="3.5" fill="#a03b2e" />

  <!-- Highlighted title line plus body text -->
  <rect x="8" y="13" width="9" height="2" rx="1" fill="#ffffff" opacity="0.95" />
  <rect x="8" y="17.5" width="6" height="2" rx="1" fill="#ffffff" opacity="0.55" />
</svg>
