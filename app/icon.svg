<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- Subtle top-lit indigo for depth (brand primary at the core) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b54ea" />
      <stop offset="1" stop-color="#4338ca" />
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)" />

  <!-- The deck: a sheet stacked behind, peeking top-right -->
  <rect x="11" y="6" width="14" height="18" rx="2.5" fill="#818cf8" />

  <!-- The paper: front sheet -->
  <rect x="7" y="8" width="14" height="18" rx="2.5" fill="#ffffff" />

  <!-- Highlighted title line (brand accent) plus body text -->
  <rect x="10" y="12.0" width="8.0" height="1.8" rx="0.9" fill="#f59e0b" />
  <rect x="10" y="15.4" width="8.0" height="1.4" rx="0.7" fill="#818cf8" />
  <rect x="10" y="18.0" width="8.0" height="1.4" rx="0.7" fill="#818cf8" />
  <rect x="10" y="20.6" width="5.0" height="1.4" rx="0.7" fill="#818cf8" />
</svg>
